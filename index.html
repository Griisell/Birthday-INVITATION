<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Invitation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#ffe3ec,#ffd6e8,#ffeaf3);
font-family:'Segoe UI', sans-serif;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
}

.card-invite{
border:none;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
overflow:hidden;
background:white;
}

.photo{
height:100%;
width:100%;
object-fit:cover;
transition:0.5s;
}

.photo:hover{
transform:scale(1.05);
}

h1{
font-weight:700;
letter-spacing:1px;
}

h3{
font-weight:600;
color:#444;
}

.btn-invite{
background:linear-gradient(45deg,#ff6fa5,#ff4c91);
color:white;
border-radius:50px;
padding:12px 30px;
font-weight:500;
border:none;
transition:0.3s;
}

.btn-invite:hover{
transform:scale(1.08);
box-shadow:0 10px 20px rgba(255,79,145,0.4);
color:white;
}

#countdown{
font-size:16px;
color:#555;
}

</style>

</head>
<body>

<div class="container hero">

<div class="row card-invite">

<div class="col-md-6 p-0">

<div id="photoCarousel" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="img/birthday1.jpeg" class="d-block w-100 photo">
</div>

<div class="carousel-item">
<img src="img/birthday2.jpeg" class="d-block w-100 photo">
</div>

<div class="carousel-item">
<img src="img/birthday3.jpeg" class="d-block w-100 photo">
</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#photoCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#photoCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

</div>

<div class="col-md-6 p-5 text-center d-flex flex-column justify-content-center">

<h1> Birthday Party</h1>

<p class="text-muted mt-3">
You are invited to celebrate a special day!
</p>

<h3 class="mt-4">Grisel's Birthday</h3>

<p class="text-muted">
Saturday, 7 March 2026 <br>
7:00 PM
</p>

<div id="countdown" class="mt-3 fw-bold"></div>

<a href="rsvp.html" class="btn btn-invite mt-3">
RSVP Now
</a>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

var birthday = new Date("March 7, 2026 19:00:00").getTime();

var countdownFunction = setInterval(function() {

var now = new Date().getTime();
var distance = birthday - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

document.getElementById("countdown").innerHTML =
"⏳ " + days + " Days " + hours + " Hours " + minutes + " Minutes left";

}, 1000);

</script>

</body>
</html>
