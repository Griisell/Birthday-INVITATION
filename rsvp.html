<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#ffd6e8,#ffe9f4);
font-family:'Segoe UI', sans-serif;
}

.card-form{
border:none;
border-radius:25px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
background:white;
}

.btn-send{
background:#ff6fa5;
color:white;
border-radius:30px;
}

</style>

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card-form col-md-6">

<h2 class="text-center">RSVP</h2>

<form>

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Will you attend?</label>
<select class="form-control">
<option>Yes, I'll be there</option>
<option>Sorry, can't come</option>
</select>
</div>

<button class="btn btn-send w-100">Submit</button>

</form>

<div class="text-center mt-3">
<a href="index.html">Back to Invitation</a>
</div>

</div>

</div>

</body>
</html>
